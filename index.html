<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <!-- Google Identity Services library -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Music&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/background.css">
</head>

<body class="essentials">
  <!-- Login button -->
  <div id="login-section">
    <div id="login-title-section">
      <h1 id="site-title">Highlander <span style="color:rgb(234, 179, 60)">Jam</span></h1>
    </div>
    <div id="login-button-section">
      <p class="welcome-text">Access restricted to UCR accounts only.<br>Welcome!</p>
      <button id="login-btn">
        <!-- Google G logo -->
        <svg width="1.125em" height="1.125em" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285f4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
          <path fill="#34a853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
          <path fill="#fbbc05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
          <path fill="#ea4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
        </svg>

        <!-- Divider -->
        <div style="width: 0.05em; height: 1.25em; background: rgb(245, 246, 248); margin: 0 0.75em;"></div>

        <span style="font-size: 1.25em; font-weight: 500; color: #4285f4;">UCR</span>
      </button>
    </div>
    <p class="desc-text">Interact with our musician community through postings!<br>Read others' and reach out -- or post your own.</p>
    <p class="desc-text">This website is currently made for desktop experience.<br>Mobile soon (?)</p>
  </div>

  <div class="bottom-left"><h4>Made by The Guitar Club @ UCR, 2026</h4></div>
  
  <img src="resources/images/ShadyWasHere.png" onclick="toggleAudio()" style="cursor: pointer;" alt="icon" class="bottom-right">
  <audio id="whipit" src="resources/sounds/Whip It!.mp3"></audio>

  <div class="animated-background" id="animated-background"></div>

  <script>
    function toggleAudio() {
      const audio = document.getElementById('whipit');
      audio.paused ? audio.play() : audio.pause();
    }

    document.body.style.visibility = "hidden";
      document.addEventListener('DOMContentLoaded', function() {
        addNotesClustered();
        document.body.style.visibility = "visible";
    });
  </script>

  <script src="js/background.js"></script>
  <script src="js/load.js"></script>
  <script type="module" src="js/login.js"> </script>
</body>
</html>
