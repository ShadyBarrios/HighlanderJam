<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact</title>
  <!-- Google Identity Services library -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/contact.css">
  <link rel="stylesheet" href="css/background.css">
</head>
<body class="essentials">
    <div id="top-bar">
        <div id="top-bar-left">
            <span>Contact | </span><button id="signout-btn">Sign Out</button>
        </div>

        <div id="top-bar-center">
            <h1 id="site-title" onclick="navigateTo('postings.html')" style="cursor: pointer;">Highlander <span style="color:rgb(234, 179, 60)">Jam</span></h1>
        </div>

        <div id="top-bar-right">
            <button class="nav-btn" id="postings-btn">To All Postings</button>
        </div>
    </div>
  <div id="form-container">
    <h2 id="form-title">Send an email to </h2>
    <hr>
    <div class="form-group">
      <label for="Message">Message</label>
      <textarea id="message" maxlength="300" rows="5" placeholder="Introduce yourself!! Clicking send will open a Gmail window for confirmation."></textarea>
    </div>

    <div class="form-actions">
      <button id="cancel-send-btn">Cancel</button>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <div class="animated-background" id="animated-background"></div>
  <script src="js/background.js"></script>
  <script>
      document.body.style.visibility = "hidden";
      document.addEventListener('DOMContentLoaded', function() {
        addNotesNotClustered();
        document.body.style.visibility = "visible";
      });
  </script>
  
  <script>
        document.getElementById("postings-btn").addEventListener("click", () => {
            window.location.href = "../postings.html";
            return;
        });
    </script>
  <script type="module" src="js/contact.js"></script>
  <script type="module" src="js/signout.js"></script>
</body>
</html>
