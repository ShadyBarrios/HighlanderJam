<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submit Posting</title>
  <!-- Google Identity Services library -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/submit.css">
  <link rel="stylesheet" href="css/background.css">
</head>
<body class="essentials">
  <div id="top-bar">
      <span id="welcome-msg"></span>
  </div>
  <div id="form-container">
    <h2 id="form-title"></h2>
    <hr>
    <div class="form-group">
      <label for="role">Posting as</label>
      <select id="role">
        <option value="Musician">Musician</option>
        <option value="Band">Band</option>
      </select>
    </div>
    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" maxlength="40" placeholder="TLDR >-<">
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" maxlength="160" rows="3" placeholder="Describe what you're looking for... Genres would be good to mention..."></textarea>
    </div>

    <div class="form-group">
      <label for="lookingFor">Looking For</label>
      <select id="lookingFor">
        <option value="musician">Musician</option>
        <option value="band">Band</option>
        <option value="jam session">Jam Sesh</option>
      </select>
    </div>

     <div class="form-group" id="experience-container">
      <label for="experience">General Experience Level</label>
      <select id="experience">
        <option value="Less than 1 year">Less than 1 year</option>
        <option value="1-3 years">1-3 years</option>
        <option value="4-7 years">4-7 years</option>
        <option value="8+ years">8+ years</option>
      </select>
    </div>

    <div class="form-group">
      <label for="anon">Anonymous Posting? <input id="anon" type="checkbox"></label>
    </div>

    <div class="form-actions">
      <button id="cancel-btn">Cancel</button>
      <button id="submit-btn">Post</button>
    </div>
  </div>

  <div class="animated-background" id="animated-background"></div>

  <script src="js/background.js"></script>
  <script>
    document.body.style.visibility = "hidden";
    document.addEventListener('DOMContentLoaded', function() {
      addNotesNotClustered();
      document.body.style.visibility = "visible";
    });
  </script>
  <script src="js/topbar.js"></script>
  <script src="./js/load.js"></script>

  <script type="module" src="./js/submit.js"></script>
  <script type="module" src="./js/signout.js"></script>
</body>
</html>
