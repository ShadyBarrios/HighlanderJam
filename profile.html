<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Postings</title>
  <!-- Google Identity Services library -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/pagination.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/background.css">
</head>

<body class="essentials">
    <div id="top-bar">
        <span id="welcome-msg"></span>
    </div>
    <div id="postings-container"></div>
    <div id="pagination">
        <button id="prev-btn"><</button>
        <span id="page-indicator">1 / 1</span>
        <button id="next-btn">></button>
    </div>

    <div class="animated-background" id="animated-background"></div>
    <script src="js/background.js"></script>
    <script src="js/topbar.js"></script>
    <script>
        document.body.style.visibility = "hidden";
        document.addEventListener('DOMContentLoaded', function() {
            addNotesNotClustered();
            document.body.style.visibility = "visible";
        });

        // media query defined in previous "topbar" script
        const customMediaQuery = window.matchMedia('(max-width: 767px)');
        function customUpdateTopBar(){
            document.getElementById("welcome-msg").innerText = `My Postings`;
            document.getElementById("nav-btn").innerText = "To All Postings";
            document.getElementById("nav-btn").addEventListener("click", () => navigateTo("../postings.html"));
        }
        customMediaQuery.addEventListener('change', customUpdateTopBar);
        customUpdateTopBar();
    </script>

    <script src="js/load.js"></script>

    <script type="module" src="js/profile.js"></script>
    <script type="module" src="js/signout.js"></script>  
</body>
</html>
