<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Postings</title>
  <!-- Google Identity Services library -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/pagination.css">
  <link rel="stylesheet" href="css/background.css">
</head>

<body class="essentials">
    <div id="top-bar">
        <div id="top-bar-left">
            <span id="welcome-msg"></span><button id="signout-btn">Sign Out</button>
        </div>

        <div id="top-bar-center">
            <h1 id="site-title" onclick="navigateTo('postings.html')" style="cursor: pointer;" id="title">Highlander <span style="color:rgb(234, 179, 60)">Jam</span></h1>
        </div>

        <div id="top-bar-right">
            <button class="nav-btn" id="profile-btn">To My Postings</button>
        </div>
    </div>
    <div id="postings-container"></div>
    <div id="pagination">
        <button id="prev-btn"><</button>
        <span id="page-indicator">1 / 1</span>
        <button id="next-btn">></button>
    </div>

    <div class="animated-background" id="animated-background"></div>
    <script src="js/background.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            addNotesNotClustered();
        });
    </script>
    
    <script src="js/load.js"></script>

    <script>
        const displayName = localStorage.getItem("displayName");
        if (displayName) {
            document.getElementById("welcome-msg").textContent = `Welcome, ${displayName} | `;
        }
    </script>
    <script type="module" src="js/pagination.js"></script>
    <script type="module" src="js/postings.js" ></script>
    <script type="module" src="js/signout.js"></script>  
</body>
</html>
